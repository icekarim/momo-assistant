name: Auto PR and Merge

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      auto_merge:
        description: 'Auto-merge the PR after creation'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  # Job for non-main branches - create PR and merge
  auto-pr-merge:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get branch info
        id: branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Current branch: $BRANCH_NAME"

      - name: Check for existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ steps.branch.outputs.name }}" --state open --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "PR #$PR_NUMBER already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No existing PR found"
          fi

      - name: Generate PR title and body
        id: pr_content
        run: |
          BRANCH_NAME="${{ steps.branch.outputs.name }}"
          
          # Extract PR title from branch name
          TITLE=$(echo "$BRANCH_NAME" | sed 's/[-_]/ /g' | sed 's/\b\(.\)/\u\1/g')
          
          # Generate body from recent commits
          BODY="## Changes\n\n"
          BODY+="$(git log origin/main..HEAD --pretty=format:'- %s' 2>/dev/null || echo '- Initial changes')"
          BODY+="\n\n---\n*Auto-generated PR by cloud agent*"
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create_pr
        if: steps.check_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "${{ steps.pr_content.outputs.title }}" \
            --body "${{ steps.pr_content.outputs.body }}" \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            2>&1) || true
          
          if echo "$PR_URL" | grep -q "https://"; then
            PR_NUMBER=$(echo "$PR_URL" | grep -oP '(?<=pull/)\d+')
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "created=true" >> $GITHUB_OUTPUT
            echo "url=$PR_URL" >> $GITHUB_OUTPUT
            echo "Created PR #$PR_NUMBER"
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "Failed to create PR: $PR_URL"
          fi

      # Notify PR Created - Slack
      - name: Notify Slack - PR Created
        if: steps.create_pr.outputs.created == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "text": "🔀 *PR Created*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔀 *New Pull Request Created*\n*Branch:* `${{ steps.branch.outputs.name }}`\n*PR:* #${{ steps.create_pr.outputs.number }}\n*Title:* ${{ steps.pr_content.outputs.title }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View PR"},
                      "url": "${{ steps.create_pr.outputs.url }}"
                    }
                  ]
                }
              ]
            }'

      # Notify PR Created - Discord
      - name: Notify Discord - PR Created
        if: steps.create_pr.outputs.created == 'true' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "embeds": [{
                "title": "🔀 New Pull Request Created",
                "color": 3447003,
                "fields": [
                  {"name": "Branch", "value": "`${{ steps.branch.outputs.name }}`", "inline": true},
                  {"name": "PR Number", "value": "#${{ steps.create_pr.outputs.number }}", "inline": true},
                  {"name": "Title", "value": "${{ steps.pr_content.outputs.title }}"}
                ],
                "url": "${{ steps.create_pr.outputs.url }}"
              }]
            }'

      # Notify PR Created - Custom Webhook
      - name: Notify Custom Webhook - PR Created
        if: steps.create_pr.outputs.created == 'true' && env.CUSTOM_WEBHOOK_URL != ''
        env:
          CUSTOM_WEBHOOK_URL: ${{ secrets.CUSTOM_WEBHOOK_URL }}
        run: |
          curl -X POST "$CUSTOM_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "event": "pr_created",
              "repository": "${{ github.repository }}",
              "branch": "${{ steps.branch.outputs.name }}",
              "pr_number": "${{ steps.create_pr.outputs.number }}",
              "pr_url": "${{ steps.create_pr.outputs.url }}",
              "title": "${{ steps.pr_content.outputs.title }}",
              "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }'

      - name: Wait for checks to pass
        id: wait_checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.check_pr.outputs.number || steps.create_pr.outputs.number }}"
          
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number available, skipping checks"
            exit 0
          fi
          
          echo "Waiting for checks on PR #$PR_NUMBER..."
          
          # Wait up to 5 minutes for checks to complete
          for i in {1..30}; do
            STATUS=$(gh pr checks "$PR_NUMBER" --json state --jq '.[] | select(.state != "SUCCESS" and .state != "SKIPPED") | .state' 2>/dev/null | head -1 || echo "")
            
            if [ -z "$STATUS" ]; then
              echo "All checks passed or no checks required"
              echo "passed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "Checks still running... (attempt $i/30)"
            sleep 10
          done
          
          echo "Checks did not complete in time, proceeding anyway"
          echo "passed=true" >> $GITHUB_OUTPUT

      - name: Auto-merge PR
        id: merge_pr
        if: (github.event_name == 'push' || github.event.inputs.auto_merge == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.check_pr.outputs.number || steps.create_pr.outputs.number }}"
          
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number available, skipping merge"
            exit 0
          fi
          
          echo "Merging PR #$PR_NUMBER..."
          
          # Enable auto-merge or merge directly
          if gh pr merge "$PR_NUMBER" --squash --auto --delete-branch 2>/dev/null; then
            echo "merged=true" >> $GITHUB_OUTPUT
            echo "method=auto-merge" >> $GITHUB_OUTPUT
          elif gh pr merge "$PR_NUMBER" --squash --delete-branch 2>/dev/null; then
            echo "merged=true" >> $GITHUB_OUTPUT
            echo "method=direct" >> $GITHUB_OUTPUT
          else
            echo "merged=false" >> $GITHUB_OUTPUT
            echo "Could not merge PR (may need manual review)"
          fi

      # Notify PR Merged - Slack
      - name: Notify Slack - PR Merged
        if: steps.merge_pr.outputs.merged == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "text": "✅ *PR Merged*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Pull Request Merged*\n*Branch:* `${{ steps.branch.outputs.name }}`\n*PR:* #${{ steps.check_pr.outputs.number || steps.create_pr.outputs.number }}\n*Method:* ${{ steps.merge_pr.outputs.method }}"
                  }
                }
              ]
            }'

      # Notify PR Merged - Discord
      - name: Notify Discord - PR Merged
        if: steps.merge_pr.outputs.merged == 'true' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "embeds": [{
                "title": "✅ Pull Request Merged",
                "color": 5763719,
                "fields": [
                  {"name": "Branch", "value": "`${{ steps.branch.outputs.name }}`", "inline": true},
                  {"name": "PR Number", "value": "#${{ steps.check_pr.outputs.number || steps.create_pr.outputs.number }}", "inline": true},
                  {"name": "Method", "value": "${{ steps.merge_pr.outputs.method }}"}
                ]
              }]
            }'

      # Notify PR Merged - Custom Webhook
      - name: Notify Custom Webhook - PR Merged
        if: steps.merge_pr.outputs.merged == 'true' && env.CUSTOM_WEBHOOK_URL != ''
        env:
          CUSTOM_WEBHOOK_URL: ${{ secrets.CUSTOM_WEBHOOK_URL }}
        run: |
          curl -X POST "$CUSTOM_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "event": "pr_merged",
              "repository": "${{ github.repository }}",
              "branch": "${{ steps.branch.outputs.name }}",
              "pr_number": "${{ steps.check_pr.outputs.number || steps.create_pr.outputs.number }}",
              "merge_method": "${{ steps.merge_pr.outputs.method }}",
              "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }'

      - name: Summary
        run: |
          echo "## Auto PR & Merge Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ steps.branch.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Created:** ${{ steps.create_pr.outputs.created || 'Already existed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Number:** ${{ steps.check_pr.outputs.number || steps.create_pr.outputs.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Merged:** ${{ steps.merge_pr.outputs.merged || 'N/A' }}" >> $GITHUB_STEP_SUMMARY

  # Job for main branch - detect changes, create branch, then PR
  main-branch-changes:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for uncommitted changes
        id: check_changes
        run: |
          # Check for uncommitted changes
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_uncommitted=true" >> $GITHUB_OUTPUT
            echo "Uncommitted changes detected:"
            git status --short
          else
            echo "has_uncommitted=false" >> $GITHUB_OUTPUT
          fi
          
          # Get the latest commit info
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "Latest commit: $COMMIT_MSG"

      - name: Create branch from main changes
        id: create_branch
        if: steps.check_changes.outputs.has_uncommitted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="auto/main-changes-${TIMESTAMP}"
          
          echo "Creating branch: $BRANCH_NAME"
          
          # Create new branch
          git checkout -b "$BRANCH_NAME"
          
          # Stage and commit all changes
          git add -A
          git commit -m "Auto: Capture uncommitted changes from main"
          
          # Push the branch
          git push -u origin "$BRANCH_NAME"
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "created=true" >> $GITHUB_OUTPUT

      - name: Create PR for branch
        id: create_pr
        if: steps.create_branch.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ steps.create_branch.outputs.branch_name }}"
          
          PR_OUTPUT=$(gh pr create \
            --title "Auto: Changes captured from main" \
            --body "## Automated Changes

This PR contains changes that were detected on the main branch and automatically branched for review.

---
*Auto-generated by cloud agent*" \
            --base main \
            --head "$BRANCH_NAME" \
            2>&1) || true
          
          if echo "$PR_OUTPUT" | grep -q "https://"; then
            PR_URL=$(echo "$PR_OUTPUT" | grep "https://")
            PR_NUMBER=$(echo "$PR_URL" | grep -oP '(?<=pull/)\d+')
            echo "Created PR #$PR_NUMBER: $PR_URL"
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "url=$PR_URL" >> $GITHUB_OUTPUT
            echo "created=true" >> $GITHUB_OUTPUT
          fi

      # Notify PR Created from Main - Slack
      - name: Notify Slack - Main Branch PR Created
        if: steps.create_pr.outputs.created == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "text": "🔀 *PR Created from Main*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔀 *Changes Detected on Main - PR Created*\n*Branch:* `${{ steps.create_branch.outputs.branch_name }}`\n*PR:* #${{ steps.create_pr.outputs.number }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View PR"},
                      "url": "${{ steps.create_pr.outputs.url }}"
                    }
                  ]
                }
              ]
            }'

      # Notify PR Created from Main - Discord
      - name: Notify Discord - Main Branch PR Created
        if: steps.create_pr.outputs.created == 'true' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "embeds": [{
                "title": "🔀 Changes Detected on Main - PR Created",
                "color": 15105570,
                "fields": [
                  {"name": "Branch", "value": "`${{ steps.create_branch.outputs.branch_name }}`", "inline": true},
                  {"name": "PR Number", "value": "#${{ steps.create_pr.outputs.number }}", "inline": true}
                ],
                "url": "${{ steps.create_pr.outputs.url }}"
              }]
            }'

      - name: Merge PR
        id: merge_pr
        if: steps.create_pr.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.number }}"
          
          if gh pr merge "$PR_NUMBER" --squash --auto --delete-branch 2>/dev/null; then
            echo "merged=true" >> $GITHUB_OUTPUT
          elif gh pr merge "$PR_NUMBER" --squash --delete-branch 2>/dev/null; then
            echo "merged=true" >> $GITHUB_OUTPUT
          else
            echo "merged=false" >> $GITHUB_OUTPUT
          fi

      # Notify PR Merged from Main - Slack
      - name: Notify Slack - Main Branch PR Merged
        if: steps.merge_pr.outputs.merged == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "text": "✅ *Main Branch PR Merged*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Main Branch PR Merged*\n*Branch:* `${{ steps.create_branch.outputs.branch_name }}`\n*PR:* #${{ steps.create_pr.outputs.number }}"
                  }
                }
              ]
            }'

      # Notify PR Merged from Main - Discord
      - name: Notify Discord - Main Branch PR Merged
        if: steps.merge_pr.outputs.merged == 'true' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "embeds": [{
                "title": "✅ Main Branch PR Merged",
                "color": 5763719,
                "fields": [
                  {"name": "Branch", "value": "`${{ steps.create_branch.outputs.branch_name }}`", "inline": true},
                  {"name": "PR Number", "value": "#${{ steps.create_pr.outputs.number }}", "inline": true}
                ]
              }]
            }'

      - name: Summary
        run: |
          echo "## Main Branch Changes Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Uncommitted Changes:** ${{ steps.check_changes.outputs.has_uncommitted }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch Created:** ${{ steps.create_branch.outputs.branch_name || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Created:** ${{ steps.create_pr.outputs.number || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Merged:** ${{ steps.merge_pr.outputs.merged || 'N/A' }}" >> $GITHUB_STEP_SUMMARY

name: Auto PR and Merge

on:
  push:
    branches:
      - '**'
      - '!main'
  workflow_dispatch:
    inputs:
      auto_merge:
        description: 'Auto-merge the PR after creation'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr-merge:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get branch info
        id: branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Current branch: $BRANCH_NAME"

      - name: Check for existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ steps.branch.outputs.name }}" --state open --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "PR #$PR_NUMBER already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No existing PR found"
          fi

      - name: Generate PR title and body
        id: pr_content
        run: |
          BRANCH_NAME="${{ steps.branch.outputs.name }}"
          
          # Extract PR title from branch name
          TITLE=$(echo "$BRANCH_NAME" | sed 's/[-_]/ /g' | sed 's/\b\(.\)/\u\1/g')
          
          # Generate body from recent commits
          BODY="## Changes\n\n"
          BODY+="$(git log origin/main..HEAD --pretty=format:'- %s' 2>/dev/null || echo '- Initial changes')"
          BODY+="\n\n---\n*Auto-generated PR by cloud agent*"
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create_pr
        if: steps.check_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "${{ steps.pr_content.outputs.title }}" \
            --body "${{ steps.pr_content.outputs.body }}" \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            2>&1) || true
          
          if echo "$PR_URL" | grep -q "https://"; then
            PR_NUMBER=$(echo "$PR_URL" | grep -oP '(?<=pull/)\d+')
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "created=true" >> $GITHUB_OUTPUT
            echo "Created PR #$PR_NUMBER"
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "Failed to create PR: $PR_URL"
          fi

      - name: Wait for checks to pass
        id: wait_checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.check_pr.outputs.number || steps.create_pr.outputs.number }}"
          
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number available, skipping checks"
            exit 0
          fi
          
          echo "Waiting for checks on PR #$PR_NUMBER..."
          
          # Wait up to 5 minutes for checks to complete
          for i in {1..30}; do
            STATUS=$(gh pr checks "$PR_NUMBER" --json state --jq '.[] | select(.state != "SUCCESS" and .state != "SKIPPED") | .state' 2>/dev/null | head -1 || echo "")
            
            if [ -z "$STATUS" ]; then
              echo "All checks passed or no checks required"
              echo "passed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "Checks still running... (attempt $i/30)"
            sleep 10
          done
          
          echo "Checks did not complete in time, proceeding anyway"
          echo "passed=true" >> $GITHUB_OUTPUT

      - name: Auto-merge PR
        if: (github.event_name == 'push' || github.event.inputs.auto_merge == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.check_pr.outputs.number || steps.create_pr.outputs.number }}"
          
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number available, skipping merge"
            exit 0
          fi
          
          echo "Merging PR #$PR_NUMBER..."
          
          # Enable auto-merge or merge directly
          gh pr merge "$PR_NUMBER" --squash --auto --delete-branch || \
          gh pr merge "$PR_NUMBER" --squash --delete-branch || \
          echo "Could not merge PR (may need manual review)"

      - name: Summary
        run: |
          echo "## Auto PR & Merge Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ steps.branch.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Created:** ${{ steps.create_pr.outputs.created || 'Already existed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Number:** ${{ steps.check_pr.outputs.number || steps.create_pr.outputs.number }}" >> $GITHUB_STEP_SUMMARY

name: Update Notion Tracker

on:
  pull_request:
    types: [opened, closed]

jobs:
  update-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout for file list
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Notion on PR event
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          DATABASE_ID: "319d79c1-41fc-819b-8c10-d569ee48cbb0"
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_BODY=$(cat <<'PRBODY'
          ${{ github.event.pull_request.body }}
          PRBODY
          )
          EVENT="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"

          TASK_NAME="PR #${PR_NUMBER}: ${PR_TITLE}"

          # Detect component from branch name
          COMPONENT="Infrastructure"
          case "$PR_BRANCH" in
            *gmail*|*email*) COMPONENT="Gmail" ;;
            *calendar*) COMPONENT="Calendar" ;;
            *task*) COMPONENT="Tasks" ;;
            *knowledge*|*kg*) COMPONENT="Knowledge Graph" ;;
            *granola*) COMPONENT="Granola" ;;
            *gemini*|*model*) COMPONENT="Gemini" ;;
            *chat*) COMPONENT="Chat" ;;
            *briefing*) COMPONENT="Briefing" ;;
            *proactive*|*nudge*|*intel*) COMPONENT="Proactive Intelligence" ;;
            *voice*|*audio*) COMPONENT="Chat" ;;
          esac

          # Detect type from branch name
          TYPE="Feature"
          case "$PR_BRANCH" in
            fix/*|hotfix/*|bug/*) TYPE="Bug Fix" ;;
            perf/*|optim*) TYPE="Performance" ;;
            refactor/*) TYPE="Refactor" ;;
            devops/*|ci/*|deploy/*|infra/*) TYPE="DevOps" ;;
          esac

          # Set status based on event
          if [ "$EVENT" = "closed" ] && [ "$MERGED" = "true" ]; then
            STATUS="Done"
          elif [ "$EVENT" = "closed" ] && [ "$MERGED" = "false" ]; then
            STATUS="Backlog"
          else
            STATUS="In Progress"
          fi

          # Get changed files
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
          FILE_COUNT=$(echo "$CHANGED_FILES" | grep -c '[^[:space:]]' || echo "0")

          echo "PR: $TASK_NAME"
          echo "Status: $STATUS | Component: $COMPONENT | Type: $TYPE"
          echo "Files changed: $FILE_COUNT"

          # Search for existing task
          SEARCH_RESULT=$(curl -s -X POST "https://api.notion.com/v1/databases/${DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{\"filter\":{\"property\":\"Task\",\"title\":{\"contains\":\"PR #${PR_NUMBER}:\"}}}")

          EXISTING_ID=$(echo "$SEARCH_RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin).get('results',[]); print(r[0]['id'] if r else '')" 2>/dev/null)

          if [ -n "$EXISTING_ID" ]; then
            # Update existing task status
            curl -s -X PATCH "https://api.notion.com/v1/pages/${EXISTING_ID}" \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "{\"properties\":{\"Status\":{\"select\":{\"name\":\"${STATUS}\"}}}}" > /dev/null
            PAGE_ID="$EXISTING_ID"
            echo "Updated existing task -> $STATUS"
          else
            # Create new task
            CREATE_RESULT=$(curl -s -X POST "https://api.notion.com/v1/pages" \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "{
                \"parent\":{\"database_id\":\"${DATABASE_ID}\"},
                \"properties\":{
                  \"Task\":{\"title\":[{\"text\":{\"content\":\"${TASK_NAME}\"}}]},
                  \"Status\":{\"select\":{\"name\":\"${STATUS}\"}},
                  \"Component\":{\"select\":{\"name\":\"${COMPONENT}\"}},
                  \"Type\":{\"select\":{\"name\":\"${TYPE}\"}}
                }
              }")
            PAGE_ID=$(echo "$CREATE_RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
            echo "Created task: $TASK_NAME [$STATUS]"
          fi

          # Add page content with PR details
          if [ -n "$PAGE_ID" ]; then
            # Build content blocks as JSON
            python3 -c "
          import json, sys, os

          pr_title = os.environ.get('PR_TITLE', '')
          pr_url = os.environ.get('PR_URL', '')
          pr_branch = os.environ.get('PR_BRANCH', '')
          pr_body = os.environ.get('PR_BODY', '').strip()
          changed_files = os.environ.get('CHANGED_FILES', '').strip()
          status = os.environ.get('STATUS', '')
          component = os.environ.get('COMPONENT', '')
          task_type = os.environ.get('TYPE', '')

          blocks = []

          # PR link callout
          blocks.append({
              'object': 'block', 'type': 'callout',
              'callout': {
                  'icon': {'type': 'emoji', 'emoji': '🔗'},
                  'rich_text': [
                      {'type': 'text', 'text': {'content': 'Pull Request: ', 'link': None}},
                      {'type': 'text', 'text': {'content': pr_url, 'link': {'url': pr_url}}},
                  ]
              }
          })

          # Branch
          blocks.append({
              'object': 'block', 'type': 'paragraph',
              'paragraph': {'rich_text': [
                  {'type': 'text', 'text': {'content': 'Branch: '}, 'annotations': {'bold': True}},
                  {'type': 'text', 'text': {'content': pr_branch}, 'annotations': {'code': True}},
                  {'type': 'text', 'text': {'content': f' | {component} | {task_type}'}},
              ]}
          })

          # PR description
          if pr_body:
              blocks.append({
                  'object': 'block', 'type': 'heading_3',
                  'heading_3': {'rich_text': [{'type': 'text', 'text': {'content': 'Description'}}]}
              })
              # Split into paragraphs, limit to 2000 chars per block
              for para in pr_body.split('\n\n'):
                  para = para.strip()
                  if not para:
                      continue
                  blocks.append({
                      'object': 'block', 'type': 'paragraph',
                      'paragraph': {'rich_text': [{'type': 'text', 'text': {'content': para[:2000]}}]}
                  })

          # Changed files
          if changed_files:
              blocks.append({
                  'object': 'block', 'type': 'heading_3',
                  'heading_3': {'rich_text': [{'type': 'text', 'text': {'content': 'Files changed'}}]}
              })
              for f in changed_files.split('\n'):
                  f = f.strip()
                  if f:
                      blocks.append({
                          'object': 'block', 'type': 'bulleted_list_item',
                          'bulleted_list_item': {'rich_text': [
                              {'type': 'text', 'text': {'content': f}, 'annotations': {'code': True}}
                          ]}
                      })

          print(json.dumps({'children': blocks}))
          " > /tmp/notion_blocks.json

            # Append content to the page
            curl -s -X PATCH "https://api.notion.com/v1/blocks/${PAGE_ID}/children" \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d @/tmp/notion_blocks.json > /dev/null
            echo "Added page content with PR details"
          fi

name: Update Notion Tracker

on:
  pull_request:
    types: [opened, merged, closed]

jobs:
  update-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Update Notion on PR event
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          DATABASE_ID: "***REMOVED-NOTION-DB-ID***"
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          EVENT="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"

          TASK_NAME="PR #${PR_NUMBER}: ${PR_TITLE}"

          # Detect component from branch name
          COMPONENT="Infrastructure"
          case "$PR_BRANCH" in
            *gmail*|*email*) COMPONENT="Gmail" ;;
            *calendar*) COMPONENT="Calendar" ;;
            *task*) COMPONENT="Tasks" ;;
            *knowledge*|*kg*) COMPONENT="Knowledge Graph" ;;
            *granola*) COMPONENT="Granola" ;;
            *gemini*|*model*) COMPONENT="Gemini" ;;
            *chat*) COMPONENT="Chat" ;;
            *briefing*) COMPONENT="Briefing" ;;
            *proactive*|*nudge*|*intel*) COMPONENT="Proactive Intelligence" ;;
          esac

          # Detect type from branch name
          TYPE="Feature"
          case "$PR_BRANCH" in
            fix/*|hotfix/*|bug/*) TYPE="Bug Fix" ;;
            perf/*|optim*) TYPE="Performance" ;;
            refactor/*) TYPE="Refactor" ;;
            devops/*|ci/*|deploy/*|infra/*) TYPE="DevOps" ;;
          esac

          # Set status based on event
          if [ "$EVENT" = "closed" ] && [ "$MERGED" = "true" ]; then
            STATUS="Done"
          elif [ "$EVENT" = "closed" ] && [ "$MERGED" = "false" ]; then
            STATUS="Backlog"
          else
            STATUS="In Progress"
          fi

          echo "PR: $TASK_NAME"
          echo "Status: $STATUS | Component: $COMPONENT | Type: $TYPE"

          # Search for existing task
          SEARCH_RESULT=$(curl -s -X POST "https://api.notion.com/v1/databases/${DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{\"filter\":{\"property\":\"Task\",\"title\":{\"contains\":\"PR #${PR_NUMBER}:\"}}}")

          EXISTING_ID=$(echo "$SEARCH_RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin).get('results',[]); print(r[0]['id'] if r else '')" 2>/dev/null)

          if [ -n "$EXISTING_ID" ]; then
            # Update existing task
            curl -s -X PATCH "https://api.notion.com/v1/pages/${EXISTING_ID}" \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "{\"properties\":{\"Status\":{\"select\":{\"name\":\"${STATUS}\"}}}}" > /dev/null
            echo "Updated existing task -> $STATUS"
          else
            # Create new task
            curl -s -X POST "https://api.notion.com/v1/pages" \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "{
                \"parent\":{\"database_id\":\"${DATABASE_ID}\"},
                \"properties\":{
                  \"Task\":{\"title\":[{\"text\":{\"content\":\"${TASK_NAME}\"}}]},
                  \"Status\":{\"select\":{\"name\":\"${STATUS}\"}},
                  \"Component\":{\"select\":{\"name\":\"${COMPONENT}\"}},
                  \"Type\":{\"select\":{\"name\":\"${TYPE}\"}}
                }
              }" > /dev/null
            echo "Created task: $TASK_NAME [$STATUS]"
          fi
